<!DOCTYPE html>
<html>
<head>
    <title>MITx Spot Check Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .upload-form {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        button {
            background-color: #a31f34;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #7a1729;
        }
    </style>
</head>
<body>
    <h1>MITx Course Spot Check Tool</h1>
    <div class="upload-form">
        <p>Upload a course tarball to generate a spot check report.</p>
        <form method="POST" action="/check" enctype="multipart/form-data">
            <input type="file" name="tarball" accept=".tar.gz" required>
            <button type="submit">Upload & Check</button>
        </form>
    </div>
</body>
</html>
